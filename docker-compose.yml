services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdp_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - app_storage:/var/www/storage/app/public
    networks:
      - cdp_network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: cdp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cdp_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cdp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: child_development_program
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: cdp_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cdp_network

volumes:
  db_data:
    driver: local
  app_storage:
    driver: local

networks:
  cdp_network:
    driver: bridge
