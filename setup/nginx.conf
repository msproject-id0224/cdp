# HTTP — hanya untuk Let's Encrypt challenge, semua traffic lain redirect ke HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mitra-project.com www.mitra-project.com;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/html/child-development-program/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — production server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mitra-project.com www.mitra-project.com;
    root /var/www/html/child-development-program/public;

    # SSL — path diisi otomatis oleh Certbot
    ssl_certificate     /etc/letsencrypt/live/mitra-project.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mitra-project.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    index index.php;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
